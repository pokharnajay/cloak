<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Rich gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#061118"/>
      <stop offset="40%" stop-color="#0A1A28"/>
      <stop offset="100%" stop-color="#0D2235"/>
    </linearGradient>
    <!-- Vibrant teal-to-cyan gradient for accent elements -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#2CB1BC"/>
      <stop offset="100%" stop-color="#1DE9B6"/>
    </linearGradient>
    <!-- Cloak hood gradient - brighter -->
    <linearGradient id="cloak" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="1"/>
      <stop offset="40%" stop-color="#2CB1BC" stop-opacity="0.85"/>
      <stop offset="75%" stop-color="#1DE9B6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1DE9B6" stop-opacity="0.02"/>
    </linearGradient>
    <!-- Large ambient glow -->
    <radialGradient id="glow1" cx="0.15" cy="0.5" r="0.4">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#2CB1BC" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2CB1BC" stop-opacity="0"/>
    </radialGradient>
    <!-- Secondary glow top-right -->
    <radialGradient id="glow2" cx="0.85" cy="0.2" r="0.35">
      <stop offset="0%" stop-color="#1DE9B6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1DE9B6" stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom accent glow -->
    <radialGradient id="glow3" cx="0.5" cy="1" r="0.5">
      <stop offset="0%" stop-color="#2CB1BC" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2CB1BC" stop-opacity="0"/>
    </radialGradient>
    <!-- Hood inner -->
    <linearGradient id="bgInner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071520"/>
      <stop offset="100%" stop-color="#0A1E2E"/>
    </linearGradient>
    <!-- Divider -->
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#2CB1BC" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1DE9B6" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Pill gradient bg -->
    <linearGradient id="pillBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D2A3A"/>
      <stop offset="100%" stop-color="#0F2D3E"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2CB1BC" stroke-opacity="0.04" stroke-width="0.5"/>
    </pattern>
    <!-- Floating particle glow -->
    <radialGradient id="particle">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" rx="16" fill="url(#bg)"/>
  <!-- Subtle grid overlay -->
  <rect width="1200" height="400" rx="16" fill="url(#grid)"/>

  <!-- Ambient glows -->
  <ellipse cx="180" cy="200" rx="300" ry="280" fill="url(#glow1)"/>
  <ellipse cx="1000" cy="80" rx="300" ry="200" fill="url(#glow2)"/>
  <ellipse cx="600" cy="400" rx="500" ry="150" fill="url(#glow3)"/>

  <!-- Floating particles for energy -->
  <circle cx="350" cy="60" r="2" fill="#00E5FF" opacity="0.5"/>
  <circle cx="500" cy="340" r="1.5" fill="#1DE9B6" opacity="0.4"/>
  <circle cx="750" cy="50" r="2.5" fill="#2CB1BC" opacity="0.3"/>
  <circle cx="900" cy="300" r="1.8" fill="#00E5FF" opacity="0.35"/>
  <circle cx="1050" cy="120" r="2" fill="#1DE9B6" opacity="0.45"/>
  <circle cx="650" cy="370" r="1.5" fill="#00E5FF" opacity="0.3"/>
  <circle cx="1100" cy="250" r="2.2" fill="#2CB1BC" opacity="0.25"/>
  <circle cx="280" cy="350" r="1.8" fill="#1DE9B6" opacity="0.3"/>
  <circle cx="820" cy="90" r="1.2" fill="#00E5FF" opacity="0.5"/>
  <circle cx="450" cy="130" r="1.5" fill="#2CB1BC" opacity="0.35"/>

  <!-- Diagonal accent line — top right -->
  <line x1="950" y1="0" x2="1200" y2="120" stroke="url(#accentGrad)" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="980" y1="0" x2="1200" y2="100" stroke="url(#accentGrad)" stroke-width="0.3" stroke-opacity="0.2"/>

  <!-- Cloak icon — larger, more vibrant -->
  <g transform="translate(80, 55) scale(0.55)">
    <!-- Outer glow ring -->
    <circle cx="160" cy="200" r="220" fill="none" stroke="#00E5FF" stroke-opacity="0.06" stroke-width="1"/>
    <circle cx="160" cy="200" r="180" fill="none" stroke="#2CB1BC" stroke-opacity="0.08" stroke-width="0.5"/>
    <!-- Hood shape -->
    <path d="
      M 160 30
      C 85 30, 20 95, 15 180
      C 10 250, 35 300, 60 350
      C 85 400, 100 440, 110 490
      C 118 440, 135 400, 150 360
      C 155 345, 158 330, 160 315
      C 162 330, 165 345, 170 360
      C 185 400, 202 440, 210 490
      C 220 440, 235 400, 260 350
      C 285 300, 310 250, 305 180
      C 300 95, 235 30, 160 30 Z
    " fill="url(#cloak)"/>
    <!-- Face void -->
    <path d="
      M 160 80
      C 115 80, 80 120, 78 170
      C 76 210, 90 245, 115 275
      C 130 292, 145 278, 160 260
      C 175 278, 190 292, 205 275
      C 230 245, 244 210, 242 170
      C 240 120, 205 80, 160 80 Z
    " fill="url(#bgInner)" opacity="0.92"/>
    <!-- Eye — brighter, with outer glow -->
    <circle cx="160" cy="178" r="20" fill="#00E5FF" opacity="0.15"/>
    <circle cx="160" cy="178" r="12" fill="#00E5FF" opacity="0.7"/>
    <circle cx="160" cy="178" r="5" fill="#FFFFFF" opacity="0.95"/>
  </g>

  <!-- Text: Cloak — larger, bolder -->
  <text x="310" y="175" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="80" font-weight="800" fill="#FFFFFF" letter-spacing="-2">Cloak</text>

  <!-- Subtitle with accent color -->
  <text x="315" y="220" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif" font-size="20" letter-spacing="0.5">
    <tspan fill="#7EC8CF">Invisible overlay for</tspan>
    <tspan fill="#FFFFFF" font-weight="600"> Claude Code</tspan>
  </text>

  <!-- Accent divider — gradient line -->
  <rect x="315" y="242" width="350" height="2" rx="1" fill="url(#line)" opacity="0.7"/>

  <!-- Feature pills — vibrant borders -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif">
    <rect x="315" y="262" width="92" height="28" rx="14" fill="url(#pillBg)" stroke="#00E5FF" stroke-opacity="0.35" stroke-width="1"/>
    <text x="337" y="281" fill="#00E5FF" font-size="12" font-weight="600">Stealth</text>

    <rect x="418" y="262" width="106" height="28" rx="14" fill="url(#pillBg)" stroke="#2CB1BC" stroke-opacity="0.35" stroke-width="1"/>
    <text x="436" y="281" fill="#2CB1BC" font-size="12" font-weight="600">Multi-Tab</text>

    <rect x="536" y="262" width="84" height="28" rx="14" fill="url(#pillBg)" stroke="#1DE9B6" stroke-opacity="0.35" stroke-width="1"/>
    <text x="553" y="281" fill="#1DE9B6" font-size="12" font-weight="600">Voice</text>

    <rect x="632" y="262" width="120" height="28" rx="14" fill="url(#pillBg)" stroke="#00E5FF" stroke-opacity="0.35" stroke-width="1"/>
    <text x="647" y="281" fill="#00E5FF" font-size="12" font-weight="600">Screenshots</text>

    <rect x="764" y="262" width="80" height="28" rx="14" fill="url(#pillBg)" stroke="#1DE9B6" stroke-opacity="0.35" stroke-width="1"/>
    <text x="781" y="281" fill="#1DE9B6" font-size="12" font-weight="600">Skills</text>
  </g>

  <!-- Platform badges — slightly brighter -->
  <g transform="translate(315, 308)">
    <rect width="78" height="24" rx="5" fill="#0D2A3A" stroke="#2CB1BC" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="15" y="16" font-family="system-ui" font-size="11" fill="#7EC8CF" font-weight="500">macOS</text>
    <rect x="88" width="88" height="24" rx="5" fill="#0D2A3A" stroke="#2CB1BC" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="100" y="16" font-family="system-ui" font-size="11" fill="#7EC8CF" font-weight="500">Windows</text>
  </g>

  <!-- Version tag — bottom right -->
  <text x="1120" y="375" font-family="monospace" font-size="11" fill="#2CB1BC" opacity="0.4" text-anchor="end">v0.2.0</text>
</svg>
