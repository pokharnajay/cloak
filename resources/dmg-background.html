<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<style>
@font-face {
    font-family: 'BigShoulders';
    src: url('file:///Users/jaypokharna/.claude/plugins/marketplaces/claude-superkit/canvas-super-creator/skills/canvas-super-creator/canvas-fonts/BigShoulders-Bold.ttf') format('truetype');
    font-weight: 700;
}
@font-face {
    font-family: 'JetBrainsMono';
    src: url('file:///Users/jaypokharna/.claude/plugins/marketplaces/claude-superkit/canvas-super-creator/skills/canvas-super-creator/canvas-fonts/JetBrainsMono-Regular.ttf') format('truetype');
    font-weight: 400;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 540px; height: 380px; overflow: hidden; -webkit-font-smoothing: antialiased; }

body {
    --bg: #070D14;
    --accent: #00E5FF;
    --accent2: #1DE9B6;
    --accent3: #2CB1BC;
    position: relative;
    background: var(--bg);
}

/* Grid */
.grid {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background:
        repeating-linear-gradient(0deg, rgba(0,229,255,0.03) 0px, rgba(0,229,255,0.03) 1px, transparent 1px, transparent 30px),
        repeating-linear-gradient(90deg, rgba(0,229,255,0.03) 0px, rgba(0,229,255,0.03) 1px, transparent 1px, transparent 30px);
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 70%);
    z-index: 1;
}

/* Orbs */
.orb { position: absolute; border-radius: 50%; z-index: 1; }
.orb-1 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(0,229,255,0.14) 0%, transparent 70%); top: -100px; left: -80px; }
.orb-2 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(29,233,182,0.1) 0%, transparent 70%); bottom: -120px; right: -60px; }
.orb-3 { width: 200px; height: 200px; background: radial-gradient(circle, rgba(44,177,188,0.08) 0%, transparent 70%); top: 40%; left: 50%; }

/* Particles */
.p { position: absolute; border-radius: 50%; z-index: 5; }
.p1 { width: 3px; height: 3px; background: var(--accent); top: 12%; left: 15%; opacity: 0.5; box-shadow: 0 0 8px var(--accent); }
.p2 { width: 2px; height: 2px; background: var(--accent2); top: 20%; right: 12%; opacity: 0.4; box-shadow: 0 0 6px var(--accent2); }
.p3 { width: 3px; height: 3px; background: var(--accent); bottom: 18%; left: 20%; opacity: 0.35; box-shadow: 0 0 10px var(--accent); }
.p4 { width: 2px; height: 2px; background: var(--accent2); bottom: 25%; right: 18%; opacity: 0.45; box-shadow: 0 0 6px var(--accent2); }
.p5 { width: 4px; height: 4px; background: var(--accent3); top: 50%; left: 50%; opacity: 0.2; box-shadow: 0 0 12px var(--accent3); }
.p6 { width: 2px; height: 2px; background: var(--accent); top: 8%; left: 50%; opacity: 0.4; box-shadow: 0 0 6px var(--accent); }
.p7 { width: 3px; height: 3px; background: var(--accent2); bottom: 10%; left: 55%; opacity: 0.3; box-shadow: 0 0 8px var(--accent2); }

/* Accent lines */
.line-h {
    position: absolute; left: 0; right: 0; height: 1px; z-index: 2;
    background: linear-gradient(90deg, transparent, rgba(0,229,255,0.12) 30%, rgba(29,233,182,0.15) 70%, transparent);
}
.lh1 { top: 25%; }
.lh2 { bottom: 22%; }

/* Content */
.content {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    z-index: 10;
}

/* Title area */
.title-area {
    margin-top: 28px;
    text-align: center;
}
.title {
    font-family: 'BigShoulders', sans-serif;
    font-size: 36px; font-weight: 700;
    color: #fff;
    letter-spacing: -0.01em;
    text-shadow: 0 0 30px rgba(0,229,255,0.2);
}
.subtitle {
    font-family: 'JetBrainsMono', monospace;
    font-size: 11px; color: rgba(0,229,255,0.6);
    margin-top: 4px; letter-spacing: 0.06em;
}

/* Install instruction */
.install-hint {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    font-family: 'JetBrainsMono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.04em;
}
.install-hint .arrow {
    display: inline-block;
    color: var(--accent);
    font-size: 18px;
    vertical-align: middle;
    margin: 0 8px;
    opacity: 0.6;
}

/* Divider below title */
.divider {
    width: 120px; height: 2px; margin-top: 10px;
    background: linear-gradient(90deg, var(--accent), var(--accent3), var(--accent2));
    border-radius: 1px;
    box-shadow: 0 0 8px rgba(0,229,255,0.25);
}

/* Noise */
.noise {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 3; pointer-events: none; opacity: 0.3; mix-blend-mode: overlay;
}

/* Drop zone area — where icons sit (transparent so DMG icons show through) */
.drop-zone {
    position: absolute;
    top: 110px; left: 40px; right: 40px; bottom: 70px;
    /* Subtle border to frame the icon area */
    border: 1px solid rgba(0,229,255,0.06);
    border-radius: 16px;
    z-index: 4;
}
</style>
</head>
<body>

<div class="grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="line-h lh1"></div>
<div class="line-h lh2"></div>

<div class="p p1"></div>
<div class="p p2"></div>
<div class="p p3"></div>
<div class="p p4"></div>
<div class="p p5"></div>
<div class="p p6"></div>
<div class="p p7"></div>

<svg class="noise" width="100%" height="100%">
  <filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter>
  <rect width="100%" height="100%" filter="url(#g)"/>
</svg>

<div class="content">
    <div class="title-area">
        <div class="title">CLOAK</div>
        <div class="subtitle">Invisible overlay for Claude Code</div>
        <div class="divider" style="margin: 10px auto 0;"></div>
    </div>
</div>

<div class="drop-zone"></div>

<div class="install-hint">
    Drag <span class="arrow">&#10132;</span> to Applications
</div>

</body></html>
