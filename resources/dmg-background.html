<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 540px; height: 380px; overflow: hidden; -webkit-font-smoothing: antialiased; }

body {
    --bg: #060C12;
    --accent: #00E5FF;
    --accent2: #1DE9B6;
    --accent3: #2CB1BC;
    position: relative;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
}

/* Grid — subtle tech feel */
.grid {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background:
        repeating-linear-gradient(0deg, rgba(0,229,255,0.025) 0px, rgba(0,229,255,0.025) 1px, transparent 1px, transparent 32px),
        repeating-linear-gradient(90deg, rgba(0,229,255,0.025) 0px, rgba(0,229,255,0.025) 1px, transparent 1px, transparent 32px);
    mask-image: radial-gradient(ellipse 70% 70% at 50% 45%, black 15%, transparent 65%);
    -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 45%, black 15%, transparent 65%);
    z-index: 1;
}

/* Orbs — ambient energy */
.orb { position: absolute; border-radius: 50%; z-index: 1; }
.orb-1 { width: 320px; height: 320px; background: radial-gradient(circle, rgba(0,229,255,0.13) 0%, transparent 70%); top: -80px; left: -60px; }
.orb-2 { width: 280px; height: 280px; background: radial-gradient(circle, rgba(29,233,182,0.09) 0%, transparent 70%); bottom: -100px; right: -40px; }
.orb-3 { width: 160px; height: 160px; background: radial-gradient(circle, rgba(0,229,255,0.07) 0%, transparent 70%); top: 35%; left: 55%; }

/* Particles — floating energy dots */
.p { position: absolute; border-radius: 50%; z-index: 5; }
.p1 { width: 3px; height: 3px; background: var(--accent); top: 10%; left: 12%; opacity: 0.5; box-shadow: 0 0 10px var(--accent); }
.p2 { width: 2px; height: 2px; background: var(--accent2); top: 18%; right: 10%; opacity: 0.4; box-shadow: 0 0 8px var(--accent2); }
.p3 { width: 3px; height: 3px; background: var(--accent); bottom: 22%; left: 18%; opacity: 0.3; box-shadow: 0 0 10px var(--accent); }
.p4 { width: 2px; height: 2px; background: var(--accent2); bottom: 15%; right: 15%; opacity: 0.4; box-shadow: 0 0 8px var(--accent2); }
.p5 { width: 2px; height: 2px; background: var(--accent); top: 6%; left: 48%; opacity: 0.35; box-shadow: 0 0 6px var(--accent); }
.p6 { width: 3px; height: 3px; background: var(--accent3); bottom: 8%; left: 52%; opacity: 0.25; box-shadow: 0 0 8px var(--accent3); }

/* Accent lines */
.line-h {
    position: absolute; left: 0; right: 0; height: 1px; z-index: 2;
    background: linear-gradient(90deg, transparent 5%, rgba(0,229,255,0.1) 30%, rgba(29,233,182,0.12) 70%, transparent 95%);
}
.lh1 { top: 24%; }
.lh2 { bottom: 20%; }

/* Noise grain */
.noise {
    position: absolute; top: 0; left: 0; width: 540px; height: 380px;
    z-index: 3; pointer-events: none; opacity: 0.25; mix-blend-mode: overlay;
}

/* Title — top center */
.title-area {
    position: absolute; top: 24px; left: 0; right: 0;
    text-align: center; z-index: 10;
}
.title {
    font-size: 34px; font-weight: 800;
    color: #fff;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow: 0 0 40px rgba(0,229,255,0.2), 0 0 80px rgba(0,229,255,0.08);
}
.tagline {
    font-size: 11px; font-weight: 500;
    color: var(--accent);
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.7;
}
.divider {
    width: 100px; height: 2px; margin: 10px auto 0;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent3), var(--accent2), transparent);
    border-radius: 1px;
    box-shadow: 0 0 12px rgba(0,229,255,0.3);
}

/* Bottom hint */
.hint {
    position: absolute; bottom: 18px; left: 0; right: 0;
    text-align: center; z-index: 10;
    font-size: 11px; font-weight: 500;
    color: rgba(255,255,255,0.25);
    letter-spacing: 1.5px;
    text-transform: uppercase;
}
.hint .arr {
    color: var(--accent);
    opacity: 0.5;
    font-size: 14px;
    margin: 0 6px;
}
</style>
</head>
<body>

<div class="grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="line-h lh1"></div>
<div class="line-h lh2"></div>
<div class="p p1"></div>
<div class="p p2"></div>
<div class="p p3"></div>
<div class="p p4"></div>
<div class="p p5"></div>
<div class="p p6"></div>

<svg class="noise" viewBox="0 0 540 380">
  <filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter>
  <rect width="540" height="380" filter="url(#g)"/>
</svg>

<div class="title-area">
    <div class="title">Cloak</div>
    <div class="tagline">Make Claude Invisible</div>
    <div class="divider"></div>
</div>

<div class="hint">Drag <span class="arr">&#10132;</span> to Applications</div>

</body></html>
